name: Refresh Kaggle Rollercoaster Dataset

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle client
        run: pip install kaggle

      - name: Download dataset
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          kaggle datasets download -d robikscube/rollercoaster-database -p data --force
          python - <<'PY'
          import pathlib, zipfile
          zip_path = pathlib.Path("data/rollercoaster-database.zip")
          out_dir = pathlib.Path("data")
          with zipfile.ZipFile(zip_path, "r") as zf:
            zf.extractall(out_dir)
          zip_path.unlink(missing_ok=True)
          # Normalize filename for stable URL in KAGGLE_CSV_URL
          src = out_dir / "coaster_db.csv"
          if src.exists():
            src.replace(out_dir / "coaster_db.csv")
          PY

      - name: Commit updated dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/coaster_db.csv
          if git diff --cached --quiet; then
            echo "No dataset changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh Kaggle coaster dataset"
          git push
