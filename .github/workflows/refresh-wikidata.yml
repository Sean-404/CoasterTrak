name: Refresh Wikidata Enrichment

on:
  schedule:
    - cron: "0 3 1 * *" # 1st of every month at 03:00 UTC
  workflow_dispatch:

jobs:
  enrich-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch & enrich coaster data from Wikidata + Wikipedia
        run: npx tsx scripts/fetch-wikidata-coasters.ts --enrich --enrich-limit 1000

      - name: Upload catalog JSON to Supabase Storage
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/upload-wikidata-to-storage.ts

      - name: Upload enriched data to Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/upload-wikidata-to-db.ts

      # Fill gaps Wikidata did not provide, using {{Infobox roller coaster}} wikitext via MediaWiki API.
      # --limit caps API calls per run (politeness + job time); re-runs monthly chew through backlog.
      - name: Backfill missing stats from Wikipedia infoboxes
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/wikipedia-infobox-backfill.ts --limit 250 --delay-ms 350
